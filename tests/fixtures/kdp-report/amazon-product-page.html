<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>ダミー書籍タイトル A - Amazon</title>
</head>
<body>
  <div id="dp-container">
    <div id="title-block">
      <h1 id="productTitle" class="a-size-large">ダミー書籍タイトル A（架空）</h1>
    </div>

    <div id="averageCustomerReviews">
      <span class="a-icon-alt">4.3 5つ星のうち4.3</span>
      <a href="#customerReviews">
        <span id="acrCustomerReviewText" class="a-size-base">15個の評価</span>
      </a>
    </div>

    <div id="detailBullets">
      <ul class="a-unordered-list a-nostyle a-vertical a-spacing-none">
        <li><span class="a-text-bold">Amazon 売れ筋ランキング: </span>
          <span>- <a href="#">本</a>の中で<span id="SalesRank">2,345位</span></span>
          <ul>
            <li><span>- 1位 (<a href="#">ビジネス・経済</a>カテゴリー 売れ筋ランキング)</span></li>
          </ul>
        </li>
        <li><span class="a-text-bold">出版社: </span><span>架空出版社</span></li>
      </ul>
    </div>

    <div id="detailBulletsWrapper">
      <div id="detail-bullets">
        <table>
          <tr>
            <td><span>Amazon 売れ筋ランキング</span></td>
            <td>
              <span><span>#2,345 本</span></span>
            </td>
          </tr>
        </table>
      </div>
    </div>

    <div id="dp-ads-center">
      <div id="centerCol">
        <div id="buyBoxSection">
          <div id="price">¥1,500</div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
