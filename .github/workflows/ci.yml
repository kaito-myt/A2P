name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

# 同一ブランチで連続 push されたら古い run をキャンセル
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PNPM_VERSION: 9.15.0
  # workflow 内の各ジョブで Prisma が generate を走らせないよう抑止 (型は generated/ にコミット済み想定)
  PRISMA_HIDE_UPDATE_MESSAGE: "true"

jobs:
  setup:
    name: Install dependencies
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [22]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm
      # pnpm-store を全ジョブで共有して install を約 4 倍高速化。
      # actions/setup-node の `cache: pnpm` (lockfile キーで cache) に加えて
      # `~/.pnpm-store` を直接 hit させる（ジョブ並列起動時のレース回避目的）。
      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ~/.pnpm-store
          key: pnpm-store-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            pnpm-store-${{ runner.os }}-
      - run: pnpm install --frozen-lockfile

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    needs: setup
    strategy:
      matrix:
        node-version: [22]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm
      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ~/.pnpm-store
          key: pnpm-store-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            pnpm-store-${{ runner.os }}-
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck

  test-unit:
    name: Unit tests (vitest)
    runs-on: ubuntu-latest
    needs: setup
    strategy:
      matrix:
        node-version: [22]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm
      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ~/.pnpm-store
          key: pnpm-store-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            pnpm-store-${{ runner.os }}-
      - run: pnpm install --frozen-lockfile
      - run: pnpm test:unit

  check-env:
    name: Check .env.example vs zod schema
    runs-on: ubuntu-latest
    needs: setup
    strategy:
      matrix:
        node-version: [22]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm
      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ~/.pnpm-store
          key: pnpm-store-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            pnpm-store-${{ runner.os }}-
      - run: pnpm install --frozen-lockfile
      - run: pnpm check:env

  check-llm-client:
    name: Check raw LLM client instantiation
    runs-on: ubuntu-latest
    needs: setup
    strategy:
      matrix:
        node-version: [22]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm
      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ~/.pnpm-store
          key: pnpm-store-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            pnpm-store-${{ runner.os }}-
      - run: pnpm install --frozen-lockfile
      - run: pnpm check:llm-client

  lint:
    name: Lint (best-effort)
    runs-on: ubuntu-latest
    needs: setup
    continue-on-error: true
    strategy:
      matrix:
        node-version: [22]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm
      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ~/.pnpm-store
          key: pnpm-store-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            pnpm-store-${{ runner.os }}-
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint

  test-e2e:
    name: E2E tests (Playwright)
    runs-on: ubuntu-latest
    needs: setup
    strategy:
      matrix:
        node-version: [22]
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: a2p_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      # CI 専用 env — 値はテスト用のダミー (.env.local は CI に存在しない)
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/a2p_test
      NEXTAUTH_SECRET: ci-test-secret-ci-test-secret-ci-test-secret-ci
      NEXTAUTH_URL: http://localhost:3001
      NEXT_PUBLIC_APP_URL: http://localhost:3001
      AUTH_USERNAME: operator
      # bcrypt hash of "Miyata11" (.env.local と同一 hash)
      AUTH_PASSWORD_HASH: $2a$12$PGxtQ3EYCBFXcJnnIBpwRObZwau5Qyo4JwEyv2hmGuSIFwh17eroa
      # E2E spec が平文を必要とする (login form 送信のため)
      E2E_AUTH_PASSWORD: Miyata11
      # シークレット/API キーは E2E で不要 (LLM 呼び出しは行わない)
      ANTHROPIC_API_KEY: dummy-anthropic
      OPENAI_API_KEY: dummy-openai
      GOOGLE_GENERATIVE_AI_API_KEY: dummy-google
      R2_ACCOUNT_ID: dummy
      R2_ACCESS_KEY_ID: dummy
      R2_SECRET_ACCESS_KEY: dummy
      R2_BUCKET_NAME: dummy
      R2_PUBLIC_URL_BASE: https://dummy.r2.cloudflarestorage.com/dummy
      RESEND_API_KEY: dummy
      MAIL_FROM: ci@example.com
      MAIL_TO: ci@example.com
      KDP_CRED_KEY: ci-test-kdp-key-ci-test-kdp-key-ci-test-kdp-key-ci-test
      LOG_LEVEL: warn
      FX_RATE_API_URL: https://open.er-api.com/v6/latest/USD
      COST_LIMIT_PER_BOOK_JPY: 500
      COST_LIMIT_MONTHLY_JPY: 50000
      CI: "true"
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm
      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ~/.pnpm-store
          key: pnpm-store-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            pnpm-store-${{ runner.os }}-
      - run: pnpm install --frozen-lockfile

      # Playwright ブラウザを別キャッシュで保持 (~700MB)
      - name: Cache Playwright browsers
        id: pw-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            playwright-${{ runner.os }}-

      - name: Install Playwright browsers
        if: steps.pw-cache.outputs.cache-hit != 'true'
        run: pnpm exec playwright install --with-deps chromium

      - name: Install Playwright system deps
        if: steps.pw-cache.outputs.cache-hit == 'true'
        run: pnpm exec playwright install-deps chromium

      - name: Prisma migrate deploy
        run: pnpm --filter @a2p/db migrate:deploy

      - name: Seed DB (User / AppSettings / Prompts / ModelAssignments)
        run: pnpm db:seed

      - name: Build web app
        run: pnpm --filter @a2p/web build

      - name: Run Playwright tests
        run: pnpm exec playwright test
        # webServer 設定で next start が自動起動される

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
